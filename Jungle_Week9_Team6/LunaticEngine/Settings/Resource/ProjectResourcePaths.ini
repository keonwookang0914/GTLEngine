{
    "Version": 1,
    "Options": {
        "Recursive": true,
        "NormalizeExtensionToLower": true,
        "UseRelativePathFromRoot": true
    },
    "ScanRules": {
        "Mesh": {
            "Obstacle": {
                "Directory": "Asset/Content/Model",
                "Extensions": [".obj", ".fbx", ".gltf", ".glb"],
                "Aliases": {
                    "Vertical_Wires/Vertical_Wires": "Game.Mesh.Obstacle.Barrier0",
		    "SlideOrJump/SlideOrJump": "Game.Mesh.Obstacle.MustJumpOrSlide0",
                    "POD/Spaceship": "Game.Mesh.Player.Runner"
                }
            }
        },
        "Sound": {
            "Background": {
                "Directory": "Asset/Content/Sound/Background",
                "Extensions": [".mp3", ".wav", ".ogg", ".flac"],
                "Category": "Background",
                "Aliases": {
                    "01. title screen": "Game.Sound.Background.TitleScreen",
                    "02. main menu": "Game.Sound.Background.MainMenu",
                    "03. tutorial": "Game.Sound.Background.Tutorial",
                    "04. cutscene 1": "Game.Sound.Background.Cutscene1",
                    "05. stage select": "Game.Sound.Background.StageSelect",
                    "06. stage intro": "Game.Sound.Background.StageIntro",
                    "08. cutscene 2": "Game.Sound.Background.Cutscene2",
                    "23. cutscene 4": "Game.Sound.Background.Cutscene4",
                    "24. last stage intro 1": "Game.Sound.Background.LastStageIntro1",
                    "25. last stage intro 2": "Game.Sound.Background.LastStageIntro2"
                }
            },
            "SFX": {
                "Directory": "Asset/Content/Sound/SFX",
                "Extensions": [".mp3", ".wav", ".ogg", ".flac"],
                "Category": "SFX"
            }
        },
        "Material": {
            "Samples": {
                "Directory": "Asset/Content/Materials",
                "Extensions": [".mat"],
                "Aliases": {
                    "samples/brick": "Sample.Material.Brick",
                    "samples/checker": "Sample.Material.Checker",
                    "samples/fakelight": "Sample.Material.FakeLight",
                    "samples/metal": "Sample.Material.Metal",
                    "samples/wood": "Sample.Material.Wood",
		    "samples/grid_blue": "Sample.Material.BlueGrid",
		    "samples/grid_red": "Sample.Material.RedGrid"
                }
            }
        },
        "Scene": {
            "Default": {
                "Directory": "Asset/Content/Scene",
                "Extensions": [".scene", ".umap"]
            }
        }
    }
}
